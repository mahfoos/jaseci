<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" role="img" aria-label="Diagram: the single jac binary bundles the entire toolchain and builds every kind of artifact">
  <style>
    .sans { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    .fg { fill: #1f2328; }
    .dim { fill: #57606a; }
    .acc { fill: #bc4c00; }
  </style>

  <!-- Left panel: the binary -->
  <rect x="16" y="40" width="300" height="340" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text class="mono acc" x="32" y="74" font-size="20" font-weight="bold">jac<tspan class="dim" font-size="12" font-weight="normal"> · one self-contained binary</tspan></text>
  <text class="sans dim" x="32" y="96" font-size="11.5">No Python. No Node. No C toolchain.</text>

  <g font-size="11" text-anchor="middle" class="sans fg">
    <rect x="32" y="112" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="131">CPython 3.14</text>
    <rect x="172" y="112" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="131">Bun (JS runtime)</text>
    <rect x="32" y="150" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="169">LLVM + Zig linker</text>
    <rect x="172" y="150" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="169">Package manager</text>
    <rect x="32" y="188" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="207">REST server</text>
    <rect x="172" y="188" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="207">K8s deployer</text>
    <rect x="32" y="226" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="245">byLLM (AI)</text>
    <rect x="172" y="226" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="245">MCP server</text>
    <rect x="32" y="264" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="283">Type checker</text>
    <rect x="172" y="264" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="283">Formatter</text>
    <rect x="32" y="302" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="96" y="321">Test runner</text>
    <rect x="172" y="302" width="128" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de"/><text x="236" y="321">Language server</text>
  </g>

  <!-- Center: arrow -->
  <text class="mono dim" x="440" y="184" font-size="11.5" text-anchor="middle">sv · cl · na</text>
  <line x1="340" y1="210" x2="526" y2="210" stroke="#bc4c00" stroke-width="2"/>
  <path d="M526,203 L544,210 L526,217 Z" fill="#bc4c00"/>
  <text class="mono acc" x="440" y="244" font-size="12" text-anchor="middle">jac build · jac start</text>
  <text class="mono dim" x="440" y="264" font-size="10.5" text-anchor="middle">Python bytecode · JS · native</text>

  <!-- Right panel: the artifacts -->
  <rect x="564" y="40" width="300" height="340" rx="12" fill="#ffffff" stroke="#d0d7de"/>
  <text class="sans acc" x="580" y="74" font-size="13" font-weight="bold" letter-spacing="1">BUILD ANYTHING</text>
  <g font-size="13" class="sans">
    <text class="acc" x="584" y="108">▸</text><text class="fg" x="602" y="108">CLI tools &amp; scripts</text>
    <text class="acc" x="584" y="137">▸</text><text class="fg" x="602" y="137">Zero-dep native executables</text>
    <text class="acc" x="584" y="166">▸</text><text class="fg" x="602" y="166">REST APIs &amp; microservices</text>
    <text class="acc" x="584" y="195">▸</text><text class="fg" x="602" y="195">Full-stack web apps</text>
    <text class="acc" x="584" y="224">▸</text><text class="fg" x="602" y="224">Desktop &amp; mobile apps</text>
    <text class="acc" x="584" y="253">▸</text><text class="fg" x="602" y="253">PyPI wheels · npm packages</text>
    <text class="acc" x="584" y="282">▸</text><text class="fg" x="602" y="282">C-ABI shared libraries</text>
    <text class="acc" x="584" y="311">▸</text><text class="fg" x="602" y="311">WebAssembly in the browser</text>
    <text class="acc" x="584" y="340">▸</text><text class="fg" x="602" y="340">Kubernetes deployments</text>
  </g>

  <text class="mono dim" x="440" y="406" font-size="11" text-anchor="middle">curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash</text>
</svg>
