name: Build Mobile Apps

# Native mobile build on the GitHub Actions runner — no EAS Cloud.
#
# Android: compiled on ubuntu-latest via Gradle, producing an APK that is
# uploaded as a GitHub artifact. iOS support will be added once Apple
# Developer credentials are provisioned (see .github/MOBILE_CICD.md).
#
# The build path: jac setup mobile → jac build --client mobile (with
# JAC_MOBILE_SKIP_EAS=1 so the plugin stops after preparing the bundle in
# .jac/mobile/) → expo prebuild → gradlew → APK.

on:
  push:
    branches:
      - feature/mobile-cicd-pipeline
    paths:
      - '.github/workflows/build-mobile.yml'
      - 'jac-client/**'

  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - android
        default: 'android'
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'debug'
      app_path:
        description: 'Path to the app to build'
        required: false
        default: 'jac-client/jac_client/examples/all-in-one'

permissions:
  contents: read

env:
  APP_PATH: ${{ github.event.inputs.app_path || 'jac-client/jac_client/examples/all-in-one' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}

jobs:
  build-android:
    name: Build Android (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Python dependencies (jaclang + jac-client)
        run: |
          python -m pip install --upgrade pip
          pip install -e jac
          pip install -e jac-client

      - name: Verify jac installation
        run: jac --version

      - name: Setup mobile project (idempotent)
        working-directory: ${{ env.APP_PATH }}
        run: |
          if [ -d "mobile" ]; then
            echo "Mobile directory already exists — skipping scaffold."
          else
            jac setup mobile
          fi

      - name: Prepare mobile bundle (web → mobile, skip EAS)
        working-directory: ${{ env.APP_PATH }}
        env:
          JAC_MOBILE_SKIP_EAS: "1"
        run: |
          # With JAC_MOBILE_SKIP_EAS=1 the plugin stops after the bundle
          # lands in .jac/mobile/ with node_modules installed.
          jac build --client mobile --platform android --build-type preview

      - name: Verify build artifacts
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: |
          test -f app.json || (echo "Missing app.json" && exit 1)
          test -f package.json || (echo "Missing package.json" && exit 1)
          test -d node_modules || (echo "Missing node_modules" && exit 1)
          test -f assets/jac-app/bundle.ts || (echo "Missing bundle.ts" && exit 1)
          echo "Bundle directory looks good."

      - name: Generate native Android project (expo prebuild)
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: |
          npx expo prebuild --platform android --clean --no-install

      # ── Release signing (only runs if all three secrets are present) ──
      # Configure secrets ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      # ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD to enable signed release
      # builds. See .github/MOBILE_CICD.md for the full setup.
      - name: Decode signing keystore
        id: keystore
        if: env.BUILD_TYPE == 'release' && env.ANDROID_KEYSTORE_BASE64 != ''
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "keystore_present=true" >> "$GITHUB_OUTPUT"

      - name: Build APK
        id: gradle
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ "$BUILD_TYPE" = "release" ] && [ "${{ steps.keystore.outputs.keystore_present }}" = "true" ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease \
              -PMYAPP_RELEASE_STORE_FILE=release.keystore \
              -PMYAPP_RELEASE_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
              -PMYAPP_RELEASE_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
              -PMYAPP_RELEASE_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "apk_variant=release" >> "$GITHUB_OUTPUT"
          else
            if [ "$BUILD_TYPE" = "release" ]; then
              echo "WARNING: release build requested but signing secrets missing — falling back to debug APK."
            fi
            echo "Building debug APK..."
            ./gradlew assembleDebug
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "apk_variant=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify APK exists
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        run: |
          test -f "${{ steps.gradle.outputs.apk_path }}" \
            || (echo "APK not produced at ${{ steps.gradle.outputs.apk_path }}" && exit 1)
          ls -lh "${{ steps.gradle.outputs.apk_path }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.gradle.outputs.apk_variant }}-${{ github.run_number }}
          path: ${{ env.APP_PATH }}/.jac/mobile/android/${{ steps.gradle.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android Build"
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Variant | ${{ steps.gradle.outputs.apk_variant || 'failed' }} |"
            echo "| APK | \`${{ steps.gradle.outputs.apk_path || '—' }}\` |"
            echo "| App path | \`${{ env.APP_PATH }}\` |"
            echo "| Artifact | \`android-${{ steps.gradle.outputs.apk_variant }}-${{ github.run_number }}\` (downloadable above) |"
          } >> "$GITHUB_STEP_SUMMARY"
