name: Build Mobile Apps

on:
  pull_request:
    paths:
      - '.github/workflows/build-mobile.yml'
      - 'jac-client/**'

  push:
    branches:
      - feature/mobile-cicd-pipeline
    paths:
      - '.github/workflows/build-mobile.yml'
      - 'jac-client/**'

  workflow_dispatch:
    inputs:
      app_path:
        description: 'Path to the Jac project (must contain jac.toml). Defaults to mobile-demo.'
        required: false
        default: 'jac-client/jac_client/examples/mobile-demo'
      api_url:
        description: 'Backend API URL to bake into the APK (overrides [mobile.features].api_url). Leave blank to use the TOML value.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android — ${{ matrix.app_path }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        app_path:
          - jac-client/jac_client/examples/mobile-demo
          - jac-client/jac_client/examples/all-in-one

    env:
      # workflow_dispatch overrides the matrix (single explicit path)
      APP_PATH: ${{ github.event.inputs.app_path || matrix.app_path }}
      JAC_MOBILE_API_URL: ${{ github.event.inputs.api_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            jac/pyproject.toml
            jac-client/pyproject.toml

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Yarn packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('jac-client/pyproject.toml') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('jac-client/pyproject.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Python dependencies (jaclang + jac-client)
        run: |
          python -m pip install --upgrade pip
          pip install -e jac
          pip install -e jac-client

      - name: Verify jac installation
        run: jac --version

      - name: Scaffold mobile project
        working-directory: ${{ env.APP_PATH }}
        run: jac setup mobile

      - name: Prepare mobile bundle (web → mobile)
        working-directory: ${{ env.APP_PATH }}
        run: jac build --client mobile -p android

      - name: Verify build artifacts
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: |
          test -f app.json          || (echo "Missing app.json"      && exit 1)
          test -f package.json      || (echo "Missing package.json"  && exit 1)
          test -d node_modules      || (echo "Missing node_modules"  && exit 1)
          test -f assets/jac-app/bundle.ts || (echo "Missing bundle.ts" && exit 1)
          echo "Build directory looks good."

      - name: Generate native Android project (expo prebuild)
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure release signing
        id: signing
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] \
             && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] \
             && [ -n "${ANDROID_KEY_ALIAS:-}" ] \
             && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::notice::Signing release APK with keystore from repository secrets"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.keystore
            STORE_PWD="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS_VAL="$ANDROID_KEY_ALIAS"
            KEY_PWD="$ANDROID_KEY_PASSWORD"
            echo "signing_mode=release-keystore" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No release keystore secrets — generating throwaway keystore (installable but NOT Play-Store-distributable)"
            STORE_PWD="ciinstall"
            KEY_ALIAS_VAL="ciinstallkey"
            KEY_PWD="ciinstall"
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -storepass "$STORE_PWD" -keypass "$KEY_PWD" -alias "$KEY_ALIAS_VAL" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Jac CI, OU=CI, O=Jaseci Labs, C=US"
            echo "signing_mode=throwaway-keystore" >> "$GITHUB_OUTPUT"
          fi

          test -f app/release.keystore || { echo "::error::release.keystore was not created"; exit 1; }

          {
            echo ""
            echo "MYAPP_RELEASE_STORE_FILE=release.keystore"
            echo "MYAPP_RELEASE_STORE_PASSWORD=$STORE_PWD"
            echo "MYAPP_RELEASE_KEY_ALIAS=$KEY_ALIAS_VAL"
            echo "MYAPP_RELEASE_KEY_PASSWORD=$KEY_PWD"
          } >> gradle.properties

          if grep -q 'CI release signing (appended)' app/build.gradle; then
            echo "CI release signing block already present; skipping append"
          else
            {
              echo ""
              echo "// === CI release signing (appended by .github/workflows/build-mobile.yml) ==="
              echo "android {"
              echo "    signingConfigs {"
              echo "        ciRelease {"
              echo "            storeFile file(MYAPP_RELEASE_STORE_FILE)"
              echo "            storePassword MYAPP_RELEASE_STORE_PASSWORD"
              echo "            keyAlias MYAPP_RELEASE_KEY_ALIAS"
              echo "            keyPassword MYAPP_RELEASE_KEY_PASSWORD"
              echo "        }"
              echo "    }"
              echo "    buildTypes {"
              echo "        release {"
              echo "            signingConfig signingConfigs.ciRelease"
              echo "        }"
              echo "    }"
              echo "}"
            } >> app/build.gradle
            echo "Appended CI release signing block to app/build.gradle"
          fi

      - name: Build release APK
        id: gradle
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found under app/build/outputs/apk/release/" >&2
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Derive artifact name
        id: artifact
        run: |
          APP_SLUG=$(basename "${{ env.APP_PATH }}")
          echo "name=${APP_SLUG}-android-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ env.APP_PATH }}/.jac/mobile/android/${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android Build — \`${{ env.APP_PATH }}\`"
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Mode | release (assembleRelease) |"
            echo "| Signing | ${{ steps.signing.outputs.signing_mode || 'unknown' }} |"
            echo "| APK | \`${{ steps.apk.outputs.apk_name || '—' }}\` |"
            echo "| Artifact | \`${{ steps.artifact.outputs.name }}\` (downloadable above) |"
            echo ""
            if [ "${{ steps.signing.outputs.signing_mode }}" = "throwaway-keystore" ]; then
              echo "> **Note:** signed with an auto-generated throwaway keystore. Installable on any device for testing, but **cannot be uploaded to Google Play**. Configure \`ANDROID_KEYSTORE_BASE64\` + 3 password/alias secrets for a stable keystore."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
