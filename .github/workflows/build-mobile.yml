name: Build Mobile Apps



on:
  pull_request:
    paths:
      - '.github/workflows/build-mobile.yml'
      - 'jac-client/**'

  workflow_dispatch:
    inputs:
      app_path:
        description: 'Path to the app to build'
        required: false
        default: 'jac-client/jac_client/examples/all-in-one'
      api_url:
        description: 'Backend API URL to bake into the APK (overrides [mobile.features].api_url from jac.toml). Leave blank to use the TOML value.'
        required: false
        default: ''

permissions:
  contents: read

env:
  APP_PATH: ${{ github.event.inputs.app_path || 'jac-client/jac_client/examples/all-in-one' }}
  # Override [mobile.features].api_url from jac.toml when set.  Picked up by
  # _resolve_production_api_url in jac-client/.../mobile/dev_helpers.jac.
  JAC_MOBILE_API_URL: ${{ github.event.inputs.api_url }}

jobs:
  build-android:
    name: Build Android (release)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            jac/pyproject.toml
            jac-client/pyproject.toml

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Yarn packages
        uses: actions/cache@v4
        with:
          # yarn v1's global cache dir on Linux runners. No yarn.lock is
          # committed (it's generated under .jac/mobile/), so key on the
          # example's package.json instead.
          path: ~/.cache/yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('**/mobile/package.json') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          # android/ is generated by expo prebuild, so we can't key on
          # gradle-wrapper.properties at checkout time — key on the RN/Expo
          # deps (mobile/package.json) which pin the AGP/Gradle version.
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/mobile/package.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Python dependencies (jaclang + jac-client)
        run: |
          python -m pip install --upgrade pip
          pip install -e jac
          pip install -e jac-client

      - name: Verify jac installation
        run: jac --version

      - name: Setup mobile project (idempotent)
        working-directory: ${{ env.APP_PATH }}
        run: |
          if [ -d "mobile" ]; then
            echo "Mobile directory already exists — skipping scaffold."
          else
            jac setup mobile
          fi

      - name: Prepare mobile bundle (web → mobile)
        working-directory: ${{ env.APP_PATH }}
        run: |
          # Bundle is prepared in .jac/mobile/ with node_modules installed.
          jac build --client mobile -p android

      - name: Verify build artifacts
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: |
          test -f app.json || (echo "Missing app.json" && exit 1)
          test -f package.json || (echo "Missing package.json" && exit 1)
          test -d node_modules || (echo "Missing node_modules" && exit 1)
          test -f assets/jac-app/bundle.ts || (echo "Missing bundle.ts" && exit 1)
          echo "Bundle directory looks good."

      - name: Generate native Android project (expo prebuild)
        working-directory: ${{ env.APP_PATH }}/.jac/mobile
        run: |
          npx expo prebuild --platform android --clean --no-install


      - name: Configure release signing
        id: signing
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] \
             && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] \
             && [ -n "${ANDROID_KEY_ALIAS:-}" ] \
             && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::notice::Signing release APK with keystore from repository secrets"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.keystore
            STORE_PWD="$ANDROID_KEYSTORE_PASSWORD"
            KEY_ALIAS_VAL="$ANDROID_KEY_ALIAS"
            KEY_PWD="$ANDROID_KEY_PASSWORD"
            echo "signing_mode=release-keystore" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No release keystore secrets found — generating throwaway keystore for this CI run (installable on any device, but NOT Play-Store-distributable)"
            STORE_PWD="ciinstall"
            KEY_ALIAS_VAL="ciinstallkey"
            KEY_PWD="ciinstall"
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -storepass "$STORE_PWD" -keypass "$KEY_PWD" -alias "$KEY_ALIAS_VAL" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Jac CI, OU=CI, O=Jaseci Labs, C=US"
            echo "signing_mode=throwaway-keystore" >> "$GITHUB_OUTPUT"
          fi

          # The keystore must exist before we point Gradle at it — fail loudly otherwise.
          test -f app/release.keystore || { echo "::error::release.keystore was not created"; exit 1; }

          # Pass keystore credentials to Gradle via gradle.properties.
          {
            echo ""
            echo "MYAPP_RELEASE_STORE_FILE=release.keystore"
            echo "MYAPP_RELEASE_STORE_PASSWORD=$STORE_PWD"
            echo "MYAPP_RELEASE_KEY_ALIAS=$KEY_ALIAS_VAL"
            echo "MYAPP_RELEASE_KEY_PASSWORD=$KEY_PWD"
          } >> gradle.properties

          # Append a self-contained release-signing block to app/build.gradle.
          # We intentionally do NOT regex-patch Expo's generated layout — we
          # re-open the `android { }` extension (Gradle allows this) and
          # override the release buildType's signingConfig.  If Expo's template
          # changes shape this still works; if the keystore or the MYAPP_RELEASE_*
          # properties are missing, Gradle fails loudly rather than silently
          # falling back to the debug keystore.
          if grep -q 'CI release signing (appended)' app/build.gradle; then
            echo "CI release signing block already present; skipping append"
          else
            {
              echo ""
              echo "// === CI release signing (appended by .github/workflows/build-mobile.yml) ==="
              echo "android {"
              echo "    signingConfigs {"
              echo "        ciRelease {"
              echo "            storeFile file(MYAPP_RELEASE_STORE_FILE)"
              echo "            storePassword MYAPP_RELEASE_STORE_PASSWORD"
              echo "            keyAlias MYAPP_RELEASE_KEY_ALIAS"
              echo "            keyPassword MYAPP_RELEASE_KEY_PASSWORD"
              echo "        }"
              echo "    }"
              echo "    buildTypes {"
              echo "        release {"
              echo "            signingConfig signingConfigs.ciRelease"
              echo "        }"
              echo "    }"
              echo "}"
            } >> app/build.gradle
            echo "Appended CI release signing block to app/build.gradle"
          fi

      - name: Build release APK
        id: gradle
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        working-directory: ${{ env.APP_PATH }}/.jac/mobile/android
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "No APK produced under app/build/outputs/apk/release/" >&2
            ls -la app/build/outputs/apk/release/ || true
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "apk_name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.run_number }}
          path: ${{ env.APP_PATH }}/.jac/mobile/android/${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android Build"
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Mode | release (assembleRelease) |"
            echo "| Signing | ${{ steps.signing.outputs.signing_mode || 'unknown' }} |"
            echo "| APK | \`${{ steps.apk.outputs.apk_name || '—' }}\` |"
            echo "| App path | \`${{ env.APP_PATH }}\` |"
            echo "| Artifact | \`android-release-${{ github.run_number }}\` (downloadable above) |"
            echo ""
            if [ "${{ steps.signing.outputs.signing_mode }}" = "throwaway-keystore" ]; then
              echo "> **Note:** signed with an auto-generated keystore. Installable on any device for testing, but **cannot be uploaded to Google Play** because the signing identity changes every CI run. Configure \`ANDROID_KEYSTORE_BASE64\` + 3 password/alias secrets to use a stable keystore. See \`.github/JAC_MOBILE.md\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
