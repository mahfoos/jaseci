[project]
name = "all-in-one"
version = "1.0.0"
description = "Jac client application: all-in-one"
entry-point = "main.jac"

[jacpack]
name = "all-in-one"
description = "Complete all-in-one example with authentication and UI components"

[serve]
base_route_app = "app"

[plugins.client.app_meta_data]
title = "All-In-One"
icon = ".assets/burger.png"
author = "Jaseci"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.client.vite.define]
"globalThis.APP_BUILD_TIME" = "2024-01-01T00:00:00Z"
"globalThis.FEATURE_ENABLED" = true

[plugins.client.assets]
custom_extensions = [".py", ".js"]


[plugins.scale.secrets]
TEST_SECRET_KEY = "${TEST_SECRET_KEY}"

[plugins.scale.monitoring]
enabled = true
namespace = "default"
walker_metrics = true

[plugins.scale.admin]
enabled = true
username = "admin"
default_password = "admin123"
require_password_reset = true

[plugins.scale.kubernetes]
redis_dashboard = true
mongodb_dashboard = true

[dependencies.npm]
antd = "^6.0.0"
jac-client-node = "1.0.7"
recharts = "latest"
tailwindcss = "latest"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "2.0.0"
"@tailwindcss/vite" = "^4.1.17"

[environments.response.headers]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"

# Mobile-specific headers (for WebView compatibility)
[environments.mobile.response.headers]
Cross-Origin-Opener-Policy = "unsafe-none"
Cross-Origin-Embedder-Policy = "unsafe-none"
Access-Control-Allow-Origin = "*"
Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
Access-Control-Allow-Headers = "Content-Type, Authorization"


# Desktop target configuration (Tauri)
[desktop]
name = "all-in-one"
identifier = "all.in.one"
version = "1.0.0"

[desktop.window]
title = "all-in-one"
width = 1200
height = 800
min_width = 800
min_height = 600
resizable = true
fullscreen = false

[desktop.platforms]
windows = true
macos = true
linux = true

[desktop.features]
system_tray = false
auto_update = false
notifications = false

# Mobile target configuration (React Native Expo)
[mobile]
name = "all-in-one"
identifier = "com.jaseci.allinone"
version = "1.0.0"
enabled = true

[mobile.platforms]
ios = true
android = true

[mobile.features]
webview_debugging = true
local_storage = true
camera = false
geolocation = false
push_notifications = false

[plugins.client.pwa]
theme_color = "#000000"
background_color = "#ffffff"
# cache_name = "jac-pwa-cache-v1"
